# docker-compose.yml
# Turnkey demo stack: Prometheus scrapes a Jitsi Videobridge /metrics endpoint
# and Grafana auto-loads the bundled dashboard via provisioning.
#
# 1. Point prometheus.yml at your JVB (edit the scrape target).
# 2. docker compose up -d
# 3. Open http://localhost:3000  (admin / admin) -> "Jitsi" folder.
services:
  prometheus:
    image: prom/prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  prometheus-data:
  grafana-data:
